<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background-color: #ffffff; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .button { display: inline-block; padding: 10px 20px; background-color: #007bff; color: #ffffff; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2 th:text="'Welcome to Resume Builder, ' + ${username} + '!'">Welcome!</h2>
    <p>We are excited to have you on board. Start building your professional resume today.</p>
    <a th:href="@{${appUrl}}" class="button">Get Started</a>
</div>
</body>
</html>
