<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background-color: #ffffff; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .button { display: inline-block; padding: 10px 20px; background-color: #28a745; color: #ffffff; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2 th:text="'Upgrade Successful, ' + ${username} + '!'">Upgrade Successful!</h2>
    <p th:text="'You have successfully upgraded to the ' + ${planName} + ' plan.'">You have successfully upgraded.</p>
    <p th:text="'Your premium access is valid until: ' + ${validUntil}">Valid until</p>
    <a th:href="@{${appUrl}}" class="button">Go to Dashboard</a>
</div>
</body>
</html>
