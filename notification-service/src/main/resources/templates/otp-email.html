<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Your OTP - Smart Resume Builder</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
  <div style="max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 8px;">
    <h2 style="color: #333;">Hello, <span th:text="${username}">User</span>!</h2>
    <p style="color: #555;">Your One-Time Password (OTP) for Smart Resume Builder login:</p>
    <div style="font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #4CAF50; text-align: center; padding: 20px;">
      <span th:text="${otp}">000000</span>
    </div>
    <p style="color: #888; font-size: 13px;">This OTP is valid for <strong>5 minutes</strong>. Do not share it with anyone.</p>
    <hr style="border: none; border-top: 1px solid #eee;"/>
    <p style="color: #aaa; font-size: 12px;">If you did not request this, please ignore this email.</p>
  </div>
</body>
</html>
