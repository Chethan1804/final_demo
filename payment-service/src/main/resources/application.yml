server:
  port: 8087

spring:
  application:
    name: payment-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/paymentdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:payment_user}
    password: ${DB_PASSWORD:payment_pass}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_SqxSw4dNkRBGM0}
    secret: ${RAZORPAY_KEY_SECRET:2hKhN05CSv2J6UP750deAvIN}
  webhook:
    secret: ${RAZORPAY_WEBHOOK_SECRET:default-webhook-secret}

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
  expiration: 86400000

# Internal token for service-to-service calls (payment → notification)
notification:
  internal:
    token: ${NOTIFICATION_INTERNAL_TOKEN:internal-secret-token-change-in-prod}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.payment_service: DEBUG