spring.application.name=AI-service
server.port=8089

# Gemini API Key
gemini.api.key=gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_KEY_HERE}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ai_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:ai_user}
spring.datasource.password=${DB_PASSWORD:ai_pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Springdoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# File upload (for PDF)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Logging
logging.level.com.AI_service=DEBUG